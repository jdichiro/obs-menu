<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Obsession Pizza — Gelato & Desserts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
img{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:contain;display:block;}
</style>
</head>
<body>
<img src="OBS-TVMenu-Screen2.png">
<script>
function goFS(){var e=document.documentElement;
  try{if(e.requestFullscreen)e.requestFullscreen();
  else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen();}catch(x){}}
goFS();setTimeout(goFS,800);setTimeout(goFS,2500);
['click','keydown'].forEach(function(ev){document.addEventListener(ev,goFS,{once:true});});
document.addEventListener('fullscreenchange',function(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement)setTimeout(goFS,500);});
var v=document.createElement('video');
v.setAttribute('loop','');v.setAttribute('muted','');v.setAttribute('playsinline','');
v.style.cssText='position:fixed;width:1px;height:1px;opacity:0.01;top:0;left:0;z-index:-1;pointer-events:none;';
document.body.appendChild(v);v.play().catch(function(){});
setInterval(function(){if(v.paused)v.play().catch(function(){});},30000);
</script>
</body>
</html>
