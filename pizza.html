<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Obsession Pizza</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
.sl{
  position:fixed;top:0;left:0;right:0;bottom:0;
  opacity:0;
  transition:opacity .8s ease;
  pointer-events:none;
}
.sl.on{opacity:1;}
.sl img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}
</style>
</head>
<body>

<div class="sl"><img src="OBS-TVMenu-Screen1-A.png"></div>
<div class="sl"><img src="OBS-TVMenu-Screen1-B.png"></div>
<div class="sl"><img src="OBS-TVMenu-Screen1-C.png"></div>
<div class="sl"><img src="OBS-TVMenu-Screen2.png"></div>
<div class="sl"><img src="OBS-TVMenu-Screen3.png"></div>

<script>
var c=0,sls=document.querySelectorAll('.sl');
sls[0].classList.add('on');
setInterval(function(){
  sls[c].classList.remove('on');
  c=(c+1)%sls.length;
  sls[c].classList.add('on');
},20000);

// Fullscreen
function goFS(){var e=document.documentElement;
  try{if(e.requestFullscreen)e.requestFullscreen();
  else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen();}catch(x){}}
goFS();setTimeout(goFS,800);setTimeout(goFS,2500);
['click','keydown'].forEach(function(ev){document.addEventListener(ev,goFS,{once:true});});
document.addEventListener('fullscreenchange',function(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement)setTimeout(goFS,500);});

// Anti-screensaver
var v=document.createElement('video');
v.setAttribute('loop','');v.setAttribute('muted','');v.setAttribute('playsinline','');
v.style.cssText='position:fixed;width:1px;height:1px;opacity:0.01;top:0;left:0;z-index:-1;pointer-events:none;';
document.body.appendChild(v);
v.play().catch(function(){});
setInterval(function(){if(v.paused)v.play().catch(function(){});},30000);
</script>
</body>
</html>
